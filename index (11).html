async function supabase(table, method, body, filter) {
  filter = filter || "";
  method = method || "GET";
  const opts = {
    method: method,
    headers: {
      "apikey": SB_KEY,
      "Authorization": "Bearer " + SB_KEY,
      "Content-Type": "application/json",
      "Accept": "application/json",
      "Prefer": "return=representation"
    }
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(SB_URL + "/rest/v1/" + table + filter, opts);
    const t = await r.text();
    return t ? JSON.parse(t) : [];
  } catch(e) { console.error(e); return null; }
}

function fmtD(d) {
  if (!d) return "–";
  return new Date(d).toLocaleDateString("de-DE", {day:"2-digit",month:"long",year:"numeric"});
}

function setState(patch) {
  Object.assign(STATE, patch);
  render();
}

// ── SUPABASE ───────────────────────────────────────────────────────────────
async function loadAll() {
  setState({laden: true});
  const [a, k, s, g] = await Promise.all([
    supabase("anfragen","GET",null,"?order=erstellt_am.desc"),
    supabase("kalender","GET",null,"?order=datum.asc"),
    supabase("stornos","GET",null,"?order=storniert_am.desc"),
    supabase("guides","GET",null,"?order=name.asc"),
  ]);
  const alle = a || [];
  setState({
    anfragen: alle.filter(x => x.status === "offen"),
    bestaetigt: alle.filter(x => x.status === "bestaetigt"),
    kalender: k || [],
    stornos: s || [],
    guides: g || [],
    laden: false
  });
}

function renderKalender() {
  if (STATE.laden) return `<div style="text-align:center;padding:60px 0;color:#78716C">⏳ Laden...</div>`;
  const j=STATE.kalMonat.getFullYear(), m=STATE.kalMonat.getMonth();
  const tage=new Date(j,m+1,0).getDate();
  const erster=(()=>{const d=new Date(j,m,1).getDay();return d===0?6:d-1;})();
  const nT={};
  STATE.kalender.forEach(k=>{const d=new Date(k.datum);if(d.getFullYear()===j&&d.getMonth()===m){const t=d.getDate();if(!nT[t])nT[t]=[];nT[t].push(k);}});
  const dm=STATE.kalender.filter(k=>{const d=new Date(k.datum);return d.getFullYear()===j&&d.getMonth()===m;}).sort((a,b)=>new Date(a.datum)-new Date(b.datum));

  const calCells = [];
  for(let i=0;i<erster;i++) calCells.push(`<div style="min-height:70px;border-top:1px solid #E8E4DC"></div>`);
  for(let i=0;i<tage;i++){
    const tag=i+1, evs=nT[tag]||[];
    const heu=new Date().getDate()===tag&&new Date().getMonth()===m&&new Date().getFullYear()===j;
    calCells.push(`
    <div style="min-height:70px;border-top:1px solid #E8E4DC;${(i+erster)%7!==0?"border-left:1px solid #E8E4DC":"none"};padding:4px 3px">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:${heu?"#D97706":"transparent"};color:${heu?"#fff":"#78716C"};font-size:12px;font-weight:${heu?700:400}">${tag}</span>

// ── BIND PAGE CONTENT ──────────────────────────────────────────────────────
function bindPageContent() {
  // Dashboard stats
  document.querySelectorAll(".dash-stat").forEach(el => {
    el.addEventListener("click", () => setState({seite: parseInt(el.dataset.seite)}));
  });
  // Anfragen cards
  document.querySelectorAll(".anfrage-card").forEach(el => {
    el.addEventListener("click", () => {
      const a = STATE.anfragen.find(x => x.id === el.dataset.id);
      if (a) setState({modal:{type:"anfrage",data:a}});
    });
  });
  // Bestätigung cards
  document.querySelectorAll(".best-card").forEach(el => {
    el.addEventListener("click", () => {
      const b = STATE.bestaetigt.find(x => x.id === el.dataset.id);
      if (b) setState({modal:{type:"bestaetigung",data:b,edit:{datum:b.datum,uhrzeit:b.uhrzeit,pax:b.pax}}});
    });
  });
  // Kalender events
  document.querySelectorAll(".kal-ev").forEach(el => {
    el.addEventListener("click", () => {
      const k = STATE.kalender.find(x => x.id === el.dataset.id);
      if (k) setState({modal:{type:"kalender",data:k,edit:{datum:k.datum,uhrzeit:k.uhrzeit,pax:k.pax}}});
    });
  });
  // Kalender nav
  const kp = document.getElementById("kalPrev");
  const kn = document.getElementById("kalNext");
  if (kp) kp.addEventListener("click", () => {
    const m = STATE.kalMonat;
    setState({kalMonat: new Date(m.getFullYear(), m.getMonth()-1, 1)});
  });
  if (kn) kn.addEventListener("click", () => {
    const m = STATE.kalMonat;
    setState({kalMonat: new Date(m.getFullYear(), m.getMonth()+1, 1)});
  });
  // Admin bindings
  bindAdmin();
}

function bindAdmin() {
  // Admin E-Mails laden und speichern
  supabase("einstellungen","GET",null,"?id=eq.1").then(d => {
    if (d && d[0]) {
      const e1 = document.getElementById("adminEmail1");
      const e2 = document.getElementById("adminEmail2");
      if (e1) e1.value = d[0].admin_email || "";
      if (e2) e2.value = d[0].admin_email2 || "";
    }
  });
  const sAE1 = document.getElementById("saveAdminEmail");
  if (sAE1) sAE1.addEventListener("click", async () => {
    const v = document.getElementById("adminEmail1").value;
    await supabase("einstellungen","PATCH",{admin_email:v},"?id=eq.1");
    zeig("✓ Admin E-Mail 1 gespeichert!");
  });
  const sAE2 = document.getElementById("saveAdminEmail2");
  if (sAE2) sAE2.addEventListener("click", async () => {
    const v = document.getElementById("adminEmail2").value;
    await supabase("einstellungen","PATCH",{admin_email2:v},"?id=eq.1");
    zeig("✓ Admin E-Mail 2 gespeichert!");
  });

  const sAPw = document.getElementById("saveAPw");
  const sGPw = document.getElementById("saveGPw");
  const sMon = document.getElementById("saveMon");
  const dAlte = document.getElementById("delAlte");
  const dAlle = document.getElementById("delAlle");
  const addG = document.getElementById("addGuide");

  if (sAPw) sAPw.addEventListener("click", async () => {
    const v = document.getElementById("aPw").value;
    if (!v) return;
    await supabase("einstellungen","PATCH",{admin_passwort:v},"?id=eq.1");
    showAdminMsg("✓ Admin-Passwort gespeichert!");
  });
  if (sGPw) sGPw.addEventListener("click", async () => {
    const v = document.getElementById("gPw").value;
    if (!v) return;
    await supabase("einstellungen","PATCH",{guide_passwort:v},"?id=eq.1");
    showAdminMsg("✓ Guide-Passwort gespeichert!");
  });
  if (sMon) sMon.addEventListener("click", async () => {
    const v = parseInt(document.getElementById("sMon").value);
    await supabase("einstellungen","PATCH",{storno_monate:v},"?id=eq.1");
    showAdminMsg("✓ Einstellung gespeichert!");
  });
  if (dAlte) dAlte.addEventListener("click", async () => {
    const mon = parseInt(document.getElementById("sMon").value)||3;
    if (!confirm("Stornos älter als "+mon+" Monate löschen?")) return;
    const g = new Date(); g.setMonth(g.getMonth()-mon);
    await supabase("stornos","DELETE",null,"?storniert_am=lt."+g.toISOString());
    await loadAll(); showAdminMsg("✓ Alte Stornos gelöscht!");
  });
  if (dAlle) dAlle.addEventListener("click", async () => {
    if (!confirm("Wirklich ALLE Stornos löschen?")) return;
    for (const s of STATE.stornos) await supabase("stornos","DELETE",null,"?id=eq."+s.id);
    await loadAll(); showAdminMsg("✓ Alle Stornos gelöscht!");
  });
  if (addG) addG.addEventListener("click", async () => {
    const name = document.getElementById("nGname").value;
    if (!name) return;
    await supabase("guides","POST",{name,telefon:document.getElementById("nGtel").value,email:document.getElementById("nGemail").value});
    await loadAll(); showAdminMsg("✓ Guide hinzugefügt!");
  });
  document.querySelectorAll(".editGuide").forEach(el => {
    el.addEventListener("click", () => {
      const g = STATE.guides.find(x => x.id === el.dataset.id);
      if (g) setState({modal:{type:"guide_edit",data:g}});
    });
  });
  document.querySelectorAll(".delGuide").forEach(el => {
    el.addEventListener("click", async () => {
      if (!confirm("Guide wirklich löschen?")) return;
      await supabase("guides","DELETE",null,"?id=eq."+el.dataset.id);
      await loadAll();
    });
  });
}

function showAdminMsg(txt) {
  setState({adminMsg:txt});
  setTimeout(()=>setState({adminMsg:""}),3000);
}

// ── BIND MODAL ─────────────────────────────────────────────────────────────
function bindModal() {
  const bg = document.getElementById("modalBg");
  if (bg) bg.addEventListener("click", e => { if (e.target===bg) setState({modal:null}); });

  const m = STATE.modal;
  if (!m) return;

  // Anfrage modal
  const mGuide = document.getElementById("mGuide");
  if (mGuide) mGuide.addEventListener("click", async () => {
    const a = m.data;
    const ids = [...(a.guide_ids||[]),"guide_"+Date.now()];
    const genug = ids.length >= a.anzahl_guides;
    await supabase("anfragen","PATCH",{guide_ids:ids,status:genug?"bestaetigt":"offen"},"?id=eq."+a.id);
    await emailAnAdmin(EJS_TEMPLATE_NEU, a);
    await loadAll(); setState({modal:null});
  });
  const mBear = document.getElementById("mBearbeiten");
  if (mBear) mBear.addEventListener("click", () => {
    const a = m.data;
    setState({modal:{type:"anfrage_edit",data:a,edit:{datum:a.datum,uhrzeit:a.uhrzeit,pax:a.pax,sprache:a.sprache,anzahl_guides:a.anzahl_guides}}});
  });
  const mSA = document.getElementById("mStornoA");
  if (mSA) mSA.addEventListener("click", async () => {
    if (!confirm("Wirklich stornieren?")) return;
    const a = m.data;
    const stornoData = {
      gast_name: a.gast_name, datum: a.datum, uhrzeit: a.uhrzeit,
      pax: a.pax, sprache: a.sprache||'D', anzahl_guides: a.anzahl_guides||1,
      guide_ids: a.guide_ids||[], status: 'storno',
      erstellt_am: a.erstellt_am||new Date().toISOString(),
      storniert_am: new Date().toISOString()
    };
    await supabase("stornos","POST",stornoData);
    await supabase("anfragen","DELETE",null,"?id=eq."+a.id);
    await emailStorno(stornoData);
    await loadAll(); setState({modal:null});
  });

  // Edit modal
  const mSE = document.getElementById("mSaveEdit");
  if (mSE) mSE.addEventListener("click", async () => {
    const edit = {
      datum: document.getElementById("eDat").value,
      uhrzeit: document.getElementById("eUhr").value,
      pax: parseInt(document.getElementById("ePax").value),
      sprache: document.getElementById("eSpr").value,
      anzahl_guides: parseInt(document.getElementById("eAG").value),
    };
    await supabase("anfragen","PATCH",edit,"?id=eq."+m.data.id);
    await loadAll(); setState({modal:null});
  });
  const mCE = document.getElementById("mCloseEdit");
  if (mCE) mCE.addEventListener("click", () => setState({modal:null}));

  // Bestätigung modal
  const mBest = document.getElementById("mBestaetigen");
  if (mBest) mBest.addEventListener("click", async () => {
    const edit = {
      datum: document.getElementById("bDat").value,
      uhrzeit: document.getElementById("bUhr").value,
      pax: parseInt(document.getElementById("bPax").value),
    };
    const kalData = {...m.data,...edit,bestaetigt_am:new Date().toISOString()};
    await supabase("kalender","POST",kalData);
    await supabase("anfragen","DELETE",null,"?id=eq."+m.data.id);
    await emailBestaetigung(kalData);
    await loadAll(); setState({modal:null});
  });
  const mSB = document.getElementById("mStornoB");
  if (mSB) mSB.addEventListener("click", async () => {
    if (!confirm("Wirklich stornieren?")) return;
    const b = m.data;
    const stornoData = {
      gast_name: b.gast_name,
      datum: b.datum,
      uhrzeit: b.uhrzeit,
      pax: b.pax,
      sprache: b.sprache || 'D',
      anzahl_guides: b.anzahl_guides || 1,
      guide_ids: b.guide_ids || [],
      status: 'storno',
      erstellt_am: b.erstellt_am || new Date().toISOString(),
      storniert_am: new Date().toISOString()
    };
    await supabase("stornos","POST",stornoData);
    await supabase("anfragen","DELETE",null,"?id=eq."+b.id);
    await emailStorno(stornoData);
    await loadAll(); setState({modal:null});
  });

  // Kalender modal
  const mKS = document.getElementById("mKalSave");
  if (mKS) mKS.addEventListener("click", async () => {
    const edit = {
      datum: document.getElementById("kDat").value,
      uhrzeit: document.getElementById("kUhr").value,
      pax: parseInt(document.getElementById("kPax").value),
    };
    await supabase("kalender","PATCH",edit,"?id=eq."+m.data.id);
    // E-Mail Änderung an Guides
    await emailAnZugewieseneGuides("Führung geändert", "Die Führung wurde geändert", {...m.data,...edit}, m.data.guide_ids);
    await loadAll(); setState({modal:null});
  });
  const mSK = document.getElementById("mStornoK");
  if (mSK) mSK.addEventListener("click", async () => {
    if (!confirm("Wirklich stornieren?")) return;
    const k = m.data;
    const stornoData = {
      gast_name: k.gast_name,
      datum: k.datum,
      uhrzeit: k.uhrzeit,
      pax: k.pax,
      sprache: k.sprache || 'D',
      anzahl_guides: k.anzahl_guides || 1,
      guide_ids: k.guide_ids || [],
      status: 'storno',
      erstellt_am: k.erstellt_am || new Date().toISOString(),
      storniert_am: new Date().toISOString()
    };
    await supabase("stornos","POST",stornoData);
    await supabase("kalender","DELETE",null,"?id=eq."+k.id);
    // E-Mail Storno an Guides
    await emailStorno(stornoData);
    await loadAll(); setState({modal:null});
  });

  // Guide edit modal
  const mGS = document.getElementById("mGeSave");
  if (mGS) mGS.addEventListener("click", async () => {
    await supabase("guides","PATCH",{
      name: document.getElementById("geN").value,
      telefon: document.getElementById("geT").value,
      email: document.getElementById("geE").value,
    },"?id=eq."+m.data.id);
    await loadAll(); setState({modal:null});
  });
  const mGC = document.getElementById("mGeClose");
  if (mGC) mGC.addEventListener("click", () => setState({modal:null}));
}

// ── BIND NEUE ANFRAGE ──────────────────────────────────────────────────────
function bindNeueAnfrageForm() {
  const bg = document.getElementById("naFormBg");
  if (bg) bg.addEventListener("click", e => { if(e.target===bg) setState({neuAnfrage:false}); });
  const cl = document.getElementById("naClose");
  if (cl) cl.addEventListener("click", () => setState({neuAnfrage:false}));
  const sv = document.getElementById("naSave");
  if (sv) sv.addEventListener("click", async () => {
    const name = document.getElementById("naName").value;
    const dat = document.getElementById("naDat").value;
    const uhr = document.getElementById("naUhr").value;
    const pax = document.getElementById("naPax").value;
    if (!name||!dat||!uhr||!pax) { alert("Bitte alle Felder ausfüllen!"); return; }
    const neueDaten = {
      gast_name:name, datum:dat, uhrzeit:uhr, pax:parseInt(pax),
      sprache:document.getElementById("naSpr").value,
      anzahl_guides:parseInt(document.getElementById("naAG").value),
      status:"offen", guide_ids:[], erstellt_am:new Date().toISOString()
    };
    await supabase("anfragen","POST", neueDaten);
    await emailAnAlleGuides(neueDaten);
    await loadAll();
    setState({neuAnfrage:false});
  });
}
